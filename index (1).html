<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Habit Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #E6A817;
    --gold-light: #FFF3D6;
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #E8E6E0;
    --text: #1A1A18;
    --muted: #8A8880;
    --accent: #2D2D2A;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0 0 60px;
  }
  header {
    background: var(--accent);
    color: white;
    padding: 28px 32px 24px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 16px;
  }
  .header-title {
    font-family: 'DM Serif Display', serif;
    font-size: 28px;
    letter-spacing: -0.5px;
  }
  .month-nav {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .nav-btn {
    background: rgba(255,255,255,0.12);
    border: none;
    color: white;
    width: 34px;
    height: 34px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s;
  }
  .nav-btn:hover { background: rgba(255,255,255,0.22); }
  .month-label {
    font-size: 16px;
    font-weight: 500;
    min-width: 140px;
    text-align: center;
    letter-spacing: 0.3px;
  }
  .sync-status {
    font-size: 12px;
    color: rgba(255,255,255,0.6);
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .sync-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #6fcf97;
  }
  .sync-dot.syncing { background: var(--gold); animation: pulse 1s infinite; }
  .sync-dot.error { background: #eb5757; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  main { max-width: 1100px; margin: 0 auto; padding: 32px 20px; }

  .section-label {
    font-family: 'DM Serif Display', serif;
    font-size: 20px;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .table-wrap { overflow-x: auto; margin-bottom: 40px; border-radius: 12px; border: 1px solid var(--border); background: var(--surface); }
  table { border-collapse: collapse; width: 100%; font-size: 13px; }
  thead th {
    background: var(--accent);
    color: rgba(255,255,255,0.85);
    font-weight: 400;
    font-size: 12px;
    letter-spacing: 0.6px;
    text-transform: uppercase;
    padding: 12px 14px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
    white-space: nowrap;
    text-align: center;
  }
  thead th.date-h { text-align: left; }
  tbody tr { border-bottom: 1px solid var(--border); transition: background 0.1s; }
  tbody tr:last-child { border-bottom: none; }
  tbody tr:hover { background: #FAFAF6; }
  tbody tr.weekend { background: #F7F6F2; }
  tbody tr.weekend:hover { background: #F2F1EC; }
  td {
    padding: 4px 8px;
    text-align: center;
    vertical-align: middle;
  }
  td.date-cell {
    text-align: left;
    padding: 4px 14px;
    font-size: 12px;
    color: var(--muted);
    white-space: nowrap;
    font-weight: 500;
    min-width: 80px;
  }
  td.date-cell .day-name {
    font-size: 10px;
    font-weight: 300;
    display: block;
    color: #bbb;
  }
  .star-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 28px;
    line-height: 1;
    padding: 4px;
    color: #D9D6CE;
    transition: transform 0.12s, color 0.12s;
    display: inline-block;
  }
  .star-btn:hover { transform: scale(1.2); }
  .star-btn.on { color: var(--gold); }

  .exp-row td {
    background: #F5F4F0;
    font-size: 11px;
    color: var(--muted);
    text-align: left;
    padding: 10px 14px;
    line-height: 1.6;
    border-top: 1px solid var(--border);
  }
  .exp-row td.exp-label {
    font-weight: 500;
    color: var(--accent);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }

  /* Table 2 */
  .t2-note-cell { text-align: left; padding: 4px 10px; min-width: 320px; }
  .t2-row { display: flex; align-items: center; gap: 8px; }
  .note-input {
    flex: 1;
    border: none;
    background: transparent;
    font-size: 12px;
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    outline: none;
    padding: 4px 0;
    border-bottom: 1px solid transparent;
    transition: border-color 0.15s;
    min-width: 0;
  }
  .note-input:focus { border-bottom-color: var(--border); }
  .note-input::placeholder { color: #C8C5BC; }

  .loading {
    text-align: center;
    padding: 60px 20px;
    color: var(--muted);
    font-size: 14px;
  }
  .loading-spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  @media (max-width: 600px) {
    header { padding: 20px 16px; }
    main { padding: 20px 12px; }
    .header-title { font-size: 22px; }
    .t2-note-cell { min-width: 200px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-title">Habit Tracker</div>
  <div class="month-nav">
    <button class="nav-btn" id="prevBtn">&#8592;</button>
    <div class="month-label" id="monthLabel"></div>
    <button class="nav-btn" id="nextBtn">&#8594;</button>
  </div>
  <div class="sync-status">
    <div class="sync-dot" id="syncDot"></div>
    <span id="syncText">Connected</span>
  </div>
</header>

<main>
  <div id="loadingDiv" class="loading">
    <div class="loading-spinner"></div>
    Loading your data...
  </div>
  <div id="content" style="display:none">
    <div class="section-label">Daily habits</div>
    <div class="table-wrap">
      <table id="t1"><thead><tr>
        <th class="date-h">Date</th>
        <th>Breakfast</th><th>Lunch</th><th>Water</th><th>No DoorDash</th><th>Movement</th><th>Sleep</th>
      </tr></thead>
      <tbody id="t1body"></tbody>
      <tfoot id="t1foot"></tfoot>
      </table>
    </div>

    <div class="section-label">Meaningful days</div>
    <div class="table-wrap">
      <table id="t2" style="width:100%;min-width:700px"><thead><tr>
        <th class="date-h" style="width:90px">Date</th>
        <th>Do one meaningful thing</th>
        <th>Socialize with someone</th>
      </tr></thead>
      <tbody id="t2body"></tbody>
      <tfoot id="t2foot"></tfoot>
      </table>
    </div>
  </div>
</main>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAvcKZ6UwfOWpABvGCY-QUgcwN1aTlfJyo",
  authDomain: "my-tracker-7ff0f.firebaseapp.com",
  projectId: "my-tracker-7ff0f",
  storageBucket: "my-tracker-7ff0f.firebasestorage.app",
  messagingSenderId: "561746261156",
  appId: "1:561746261156:web:dd393ef70e9fd219726231"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const h1 = ['Breakfast','Lunch','Water','No DoorDash','Movement','Sleep'];
const e1 = [
  'Eat anything within 1 hr after waking up',
  'Eat something or take a 20-min break, no screen',
  '2 glasses of water',
  'No DoorDash orders today',
  '10k steps or 30 mins of any exercise',
  '7 hrs of sleep — timing doesn\'t matter'
];
const h2 = ['Do one meaningful thing','Socialize with someone'];
const e2 = [
  'Cooking, cleaning, laundry, to-do list, creative, learning — anything intentional other than TV/movie or scrolling. Write down what you did.',
  'Online chat, text, call, party, long convo with a stranger — anything that makes a connection. Write down names or activity.'
];

const MONTH_NAMES = ['January','February','March','April','May','June','July','August','September','October','November','December'];
const DAYS = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();
let monthData = {};
let saveTimer = null;

function monthKey() { return `${currentYear}-${String(currentMonth+1).padStart(2,'0')}`; }

function getDaysInMonth(year, month) {
  return new Date(year, month+1, 0).getDate();
}

function getDayRows() {
  const count = getDaysInMonth(currentYear, currentMonth);
  return Array.from({length: count}, (_,i) => {
    const d = new Date(currentYear, currentMonth, i+1);
    return { num: i+1, dayName: DAYS[d.getDay()], isWeekend: d.getDay()===0||d.getDay()===6 };
  });
}

function setSync(state) {
  const dot = document.getElementById('syncDot');
  const txt = document.getElementById('syncText');
  dot.className = 'sync-dot' + (state==='syncing'?' syncing':state==='error'?' error':'');
  txt.textContent = state==='syncing'?'Saving...':state==='error'?'Offline':'Saved';
}

async function loadMonth() {
  document.getElementById('loadingDiv').style.display='block';
  document.getElementById('content').style.display='none';
  setSync('syncing');
  try {
    const ref = doc(db, 'tracker', monthKey());
    const snap = await getDoc(ref);
    monthData = snap.exists() ? snap.data() : {};
    setSync('ok');
  } catch(e) {
    setSync('error');
    monthData = {};
  }
  document.getElementById('loadingDiv').style.display='none';
  document.getElementById('content').style.display='block';
  renderAll();
}

function scheduleSave() {
  setSync('syncing');
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async ()=>{
    try {
      await setDoc(doc(db, 'tracker', monthKey()), monthData);
      setSync('ok');
    } catch(e) { setSync('error'); }
  }, 800);
}

function getD1(date) {
  if (!monthData[`d1_${date}`]) monthData[`d1_${date}`] = h1.map(()=>false);
  return monthData[`d1_${date}`];
}
function getD2(date) {
  if (!monthData[`d2_${date}`]) monthData[`d2_${date}`] = h2.map(()=>({on:false,note:''}));
  return monthData[`d2_${date}`];
}

function starBtn(on, clickFn) {
  const btn = document.createElement('button');
  btn.type = 'button';
  btn.className = 'star-btn' + (on?' on':'');
  btn.textContent = on ? '★' : '☆';
  btn.addEventListener('click', clickFn);
  return btn;
}

function renderAll() {
  document.getElementById('monthLabel').textContent = `${MONTH_NAMES[currentMonth]} ${currentYear}`;
  renderT1();
  renderT2();
}

function renderT1() {
  const tb = document.getElementById('t1body');
  tb.innerHTML = '';
  getDayRows().forEach(day => {
    const dateKey = `${currentMonth+1}/${day.num}`;
    const data = getD1(dateKey);
    const tr = document.createElement('tr');
    if (day.isWeekend) tr.className = 'weekend';
    const td0 = document.createElement('td');
    td0.className = 'date-cell';
    td0.innerHTML = `${MONTH_NAMES[currentMonth].slice(0,3)} ${day.num}<span class="day-name">${day.dayName}</span>`;
    tr.appendChild(td0);
    h1.forEach((_,i) => {
      const td = document.createElement('td');
      td.appendChild(starBtn(data[i], () => {
        data[i] = !data[i];
        monthData[`d1_${dateKey}`] = data;
        scheduleSave();
        renderT1();
      }));
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  const tf = document.getElementById('t1foot');
  tf.innerHTML = '';
  const er = document.createElement('tr');
  er.className = 'exp-row';
  const etd = document.createElement('td');
  etd.className = 'exp-label';
  etd.textContent = 'Guide';
  er.appendChild(etd);
  e1.forEach(e => {
    const td = document.createElement('td');
    td.textContent = e;
    er.appendChild(td);
  });
  tf.appendChild(er);
}

function renderT2() {
  const tb = document.getElementById('t2body');
  tb.innerHTML = '';
  getDayRows().forEach(day => {
    const dateKey = `${currentMonth+1}/${day.num}`;
    const data = getD2(dateKey);
    const tr = document.createElement('tr');
    if (day.isWeekend) tr.className = 'weekend';
    const td0 = document.createElement('td');
    td0.className = 'date-cell';
    td0.innerHTML = `${MONTH_NAMES[currentMonth].slice(0,3)} ${day.num}<span class="day-name">${day.dayName}</span>`;
    tr.appendChild(td0);
    h2.forEach((_,i) => {
      const td = document.createElement('td');
      td.className = 't2-note-cell';
      const wrap = document.createElement('div');
      wrap.className = 't2-row';
      const {on, note} = data[i];
      wrap.appendChild(starBtn(on, () => {
        data[i].on = !data[i].on;
        monthData[`d2_${dateKey}`] = data;
        scheduleSave();
        renderT2();
      }));
      const inp = document.createElement('input');
      inp.className = 'note-input';
      inp.placeholder = 'add notes...';
      inp.value = note;
      inp.addEventListener('input', e => {
        data[i].note = e.target.value;
        monthData[`d2_${dateKey}`] = data;
        scheduleSave();
      });
      inp.addEventListener('change', e => {
        data[i].note = e.target.value;
        monthData[`d2_${dateKey}`] = data;
        scheduleSave();
      });
      wrap.appendChild(inp);
      td.appendChild(wrap);
      tr.appendChild(td);
    });
    tb.appendChild(tr);
  });
  const tf = document.getElementById('t2foot');
  tf.innerHTML = '';
  const er = document.createElement('tr');
  er.className = 'exp-row';
  const etd = document.createElement('td');
  etd.className = 'exp-label';
  etd.textContent = 'Guide';
  er.appendChild(etd);
  e2.forEach(e => {
    const td = document.createElement('td');
    td.textContent = e;
    er.appendChild(td);
  });
  tf.appendChild(er);
}

document.getElementById('prevBtn').addEventListener('click', () => {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  loadMonth();
});
document.getElementById('nextBtn').addEventListener('click', () => {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  loadMonth();
});

loadMonth();
</script>
</body>
</html>
